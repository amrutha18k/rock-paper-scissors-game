<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="rps-css/rps-gen.css">
    <link rel="stylesheet" href="rps-css/rps-css.css">
  </head>
  <body>
    <p class="title">
      Rock Paper scissors
    </p>
    <div class="buttons">
      <button class="mov" onclick="
        pickCmpMov();
        playGame('rock');
      ">
      <img src="rpsemoj/rock-emoji.png" class="mov-icon"></button>

      <button class="mov" onclick="
        pickCmpMov();
        playGame('paper');
      ">
      <img src="rpsemoj/paper-emoji.png" class="mov-icon"></button>

      <button class="mov" onclick="
        pickCmpMov();
        playGame('scissors');
      ">
      <img src="rpsemoj/scissors-emoji.png" class="mov-icon"></button>
    </div>

    <p class="js-res res"></p>
    <p class="js-mov"></p>
    <p class="js-score score"> </p>

    <button class="rst-score" onclick="
      score.losses=0;
      score.ties=0;
      score.wins=0;
      localStorage.removeItem('score');
      updateScoreElm();
      let msg=document.querySelector('.auto-msg');
      msg.classList.add('js-auto-msg');
      msg.innerHTML='score has been reset.';
      setTimeout(()=>{
        msg.innerHTML='';
        msg.classList.remove('js-auto-msg');
        },2000);
    ">Reset Score</button>

    <button class="rst-score" onclick="
      autoPlay();
    ">Auto play</button>

    <p class="auto-msg"></p>

    <script src="rps-js/rps-js.js"></script>
    </body>
</html>
